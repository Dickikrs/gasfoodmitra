<!DOCTYPE html>
<html>
<head>
  <title>Driver App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      background: green;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 10px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    button {
      background: green;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 5px;
      border-radius: 5px;
      width: 100%;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<header>🛵 Driver App</header>

<div class="container">

  <h3>Daftar Driver</h3>
  <input type="text" id="nama" placeholder="Nama">
  <input type="text" id="hp" placeholder="No HP">
  <input type="text" id="kendaraan" placeholder="Motor / Mobil">
  <button onclick="daftar()">Daftar Driver</button>

  <hr>

  <h3>Order Masuk</h3>
  <div id="orders">Belum ada order...</div>

</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyyyuCfRicKNmqv14b9dMYjefj7hf0h-rb0G1zehEkEVJclQWLl75H2PzZvv8MvrJS9/exec"; // WAJIB GANTI

let driver_id = "";

// 🔥 CONFIG FIREBASE (SUDAH SESUAI PUNYA KAMU)
const firebaseConfig = {
  apiKey: "bebas",
  authDomain: "bebas",
  databaseURL: "https://gas-food-default-rtdb.asia-southeast1.firebasedatabase.app/",
  projectId: "bebas"
};

firebase.initializeApp(firebaseConfig);


// 🛵 DAFTAR DRIVER
function daftar() {
  console.log("Daftar driver diklik...");

  fetch(URL, {
    method: "POST",
    body: JSON.stringify({
      action: "daftarDriver",
      nama: document.getElementById("nama").value,
      no_hp: document.getElementById("hp").value,
      kendaraan: document.getElementById("kendaraan").value
    })
  })
  .then(res => res.json())
  .then(res => {
    console.log("Response daftar:", res);

    driver_id = res.id_driver;

    alert("Driver terdaftar! ID: " + driver_id);

    startTracking(); // 🔥 WAJIB
    loadOrder();
  });
}


// 📦 LOAD ORDER
function loadOrder() {
  fetch(URL + "?action=getOrderAvailable")
  .then(res => res.json())
  .then(data => {
    let html = "";

    if (data.length == 0) {
      html = "Tidak ada order";
    }

    data.forEach(o => {
      html += `
        <div class="card">
          <b>${o[1]}</b><br>
          ${o[2]}<br>
          Rp ${o[3]}<br>
          <button onclick="ambil('${o[0]}')">Ambil Order</button>
        </div>
      `;
    });

    document.getElementById("orders").innerHTML = html;
  });
}


// 🚚 AMBIL ORDER
function ambil(id_order) {
  fetch(URL, {
    method: "POST",
    body: JSON.stringify({
      action: "ambilOrder",
      id_order: id_order,
      id_driver: driver_id
    })
  })
  .then(res => res.json())
  .then(res => {
    alert("Order diambil!");
    loadOrder();
  });
}


// 📍 TRACKING DRIVER (FIX + DEBUG)
function startTracking() {
  console.log("🔥 Tracking dimulai...");

  if (!navigator.geolocation) {
    alert("Browser tidak support GPS");
    return;
  }

  navigator.geolocation.watchPosition(
    function(pos) {
      if (!driver_id) {
        console.log("❌ Driver ID kosong!");
        return;
      }

      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;

      console.log("📍 Lokasi:", lat, lng);

      firebase.database().ref("drivers/" + driver_id).set({
        lat: lat,
        lng: lng,
        status: "online",
        update: Date.now()
      });

      console.log("✅ Terkirim ke Firebase");
    },
    function(err) {
      console.log("❌ ERROR GPS:", err);
      alert("GPS error / belum diizinkan");
    },
    {
      enableHighAccuracy: true
    }
  );
}


// 🔄 AUTO REFRESH ORDER
setInterval(loadOrder, 5000);

</script>

</body>
</html>
