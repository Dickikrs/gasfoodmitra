<!DOCTYPE html>
<html>
<head>
  <title>Driver App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; background: #f5f5f5; margin: 0; }
    header { background: green; color: white; padding: 15px; text-align: center; font-size: 20px; }
    .container { padding: 10px; }
    .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; }
    button { background: green; color: white; border: none; padding: 10px; margin-top: 5px; border-radius: 5px; width: 100%; }
    input { width: 100%; padding: 10px; margin-top: 5px; }
    #log { background: black; color: lime; padding: 10px; font-size: 12px; height: 150px; overflow: auto; }
  </style>
</head>

<body>

<header>🛵 Driver App</header>

<div id="log">LOG:</div>

<div class="container">

  <h3>Daftar Driver</h3>
  <input type="text" id="nama" placeholder="Nama">
  <input type="text" id="hp" placeholder="No HP">
  <input type="text" id="kendaraan" placeholder="Motor / Mobil">
  <button onclick="daftar()">Daftar Driver</button>

  <button onclick="toggleTracking()">🟢 ON / 🔴 OFF Driver</button>

  <hr>

  <h3>Order Masuk</h3>
  <div id="orders">Belum ada order...</div>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyyyuCfRicKNmqv14b9dMYjefj7hf0h-rb0G1zehEkEVJclQWLl75H2PzZvv8MvrJS9/exec";

let driver_id = "";
let watchId = null;
let isTracking = false;
let lastLat = null;
let lastLng = null;

firebase.initializeApp({
  databaseURL: "https://gas-food-default-rtdb.asia-southeast1.firebasedatabase.app/"
});

function log(msg) {
  document.getElementById("log").innerHTML += "<br>" + msg;
}

// 🛵 DAFTAR DRIVER
function daftar() {
  fetch(URL, {
    method: "POST",
    body: JSON.stringify({
      action: "daftarDriver",
      nama: nama.value,
      no_hp: hp.value,
      kendaraan: kendaraan.value
    })
  })
  .then(res => res.json())
  .then(res => {
    driver_id = res.id_driver;
    log("🆔 " + driver_id);
    loadOrder();
  });
}

// 🔁 ON/OFF TRACKING
function toggleTracking() {
  if (!driver_id) {
    alert("Daftar dulu!");
    return;
  }

  if (!isTracking) {
    startTracking();
  } else {
    stopTracking();
  }
}

// ▶ START TRACKING
function startTracking() {
  log("🟢 Tracking ON");
  isTracking = true;

  watchId = navigator.geolocation.watchPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    // filter kalau terlalu dekat (hemat)
    if (lastLat && Math.abs(lat - lastLat) < 0.0001) return;

    lastLat = lat;
    lastLng = lng;

    firebase.database().ref("drivers/" + driver_id).update({
      lat,
      lng,
      status: "online",
      update: Date.now()
    });

    log("📍 " + lat + "," + lng);

  }, err => {
    log("❌ GPS: " + err.message);
  }, {
    enableHighAccuracy: true
  });
}

// ⛔ STOP TRACKING
function stopTracking() {
  log("🔴 Tracking OFF");
  isTracking = false;

  navigator.geolocation.clearWatch(watchId);

  firebase.database().ref("drivers/" + driver_id).update({
    status: "offline"
  });
}

// 📦 LOAD ORDER
function loadOrder() {
  fetch(URL + "?action=getOrderAvailable")
  .then(res => res.json())
  .then(data => {
    let html = "";

    if (data.length == 0) html = "Tidak ada order";

    data.forEach(o => {
      html += `
        <div class="card">
          <b>${o[1]}</b><br>
          ${o[2]}<br>
          Rp ${o[3]}<br>
          <button onclick="ambil('${o[0]}')">Ambil Order</button>
        </div>
      `;
    });

    orders.innerHTML = html;
  });
}

// 🚚 AMBIL ORDER
function ambil(id_order) {
  fetch(URL, {
    method: "POST",
    body: JSON.stringify({
      action: "ambilOrder",
      id_order,
      id_driver: driver_id
    })
  })
  .then(() => {
    log("✅ Ambil order");
    loadOrder();
  });
}

// 🔄 AUTO REFRESH
setInterval(loadOrder, 5000);
</script>

</body>
</html>
